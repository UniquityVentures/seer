Debug = true
DBType = "Postgres"
Address = ":8080"

[PostgresConfig]
DSN = "postgres://postgres:postgres@localhost:5432/seer?sslmode=disable"

[Plugins.p_users]
signingKey = "change-me"
jwtIssuer = "seer"

[Plugins.p_pwa]
serviceWorkerPath = ""
offlineViewName = ""
staticDir = "./pwa_static/"
PWA_APP_NAME = "Seer"
PWA_APP_DESCRIPTION = "Seer intelligence platform"
PWA_APP_THEME_COLOR = "#0A0302"
PWA_APP_BACKGROUND_COLOR = "#ffffff"
PWA_APP_DISPLAY = "standalone"
PWA_APP_SCOPE = "/"
PWA_APP_ORIENTATION = "any"
PWA_APP_START_URL = "/"
PWA_APP_STATUS_BAR_COLOR = "default"
PWA_APP_DIR = "ltr"
PWA_APP_LANG = "en-US"
