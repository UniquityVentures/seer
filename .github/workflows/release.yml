name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Build all deployments
        env:
          REMOTE_URL: "wss://seer.lariv.in/fleet/websocket"
          PKG_CONFIG_DIR: ""
          PKG_CONFIG_LIBDIR: "/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          PKG_CONFIG_SYSROOT_DIR: "/"
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libfontconfig1-dev pkg-config fontconfig protobuf-compiler libfontconfig1-dev:arm64
          rustup target add aarch64-unknown-linux-gnu
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go build -ldflags "-s -w" -o "main"
          cd nodescraper-rs && cargo build --release && cargo build --release --target=aarch64-unknown-linux-gnu

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main
            nodescraper-rs/target/aarch64-unknown-linux-gnu/release/nodescraper-rs
          generate_release_notes: true
